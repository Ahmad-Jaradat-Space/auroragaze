app = "auroragaze"
primary_region = "syd"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-2x"
  memory = "2gb"

[env]
  CHROMA_DIR = "/app/data/chroma"
  CORPUS_DIR = "/app/data/corpus"
  LLM_PROVIDER = "deepseek"
